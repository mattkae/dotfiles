action_key: meta
includes:
  - ~/.config/miracle-wm/user-config.yaml
custom_actions:
  - command: wofi --show=drun
    action: down
    key: d
    modifiers:
      - primary
  - command: grimshot copy area
    action: down
    key: s
    modifiers:
      - shift
      - primary
  - command: swaylock
    action: down
    key: l
    modifiers:
      - primary
      - shift
  - command: pamixer -d 10
    action: down
    key: XF86AudioLowerVolume
    modifiers:
      []
  - command: pamixer -i 10
    action: down
    key: XF86AudioRaiseVolume
    modifiers:
      []
  - command: pamixer -t
    action: down
    key: XF86AudioMute
    modifiers:
      []
  - command: brightnessctl s 100-
    action: down
    key: XF86MonBrightnessDown
    modifiers:
      []
  - command: brightnessctl s +100
    action: down
    key: XF86MonBrightnessUp
    modifiers:
      []
  - command: wlogout --protocol layer-shell
    action: down
    key: e
    modifiers:
      - shift
      - primary
  - command: miraclemsg workspace music
    action: down
    key: m
    modifiers:
      - shift
      - primary
inner_gaps:
  x: 16
  y: 16
outer_gaps:
  x: 8
  y: 8
startup_apps:
  - command: waybar
  - command: ~/.local/bin/launch-swaybg.sh
  - command: swaync
terminal: kitty
resize_jump: 50
border:
  size: 2
  color: 0xbd93f9ff
  focus_color: 0x50fa7bff
animations:
  - type: built_in
    event: workspace_switch
    duration: 0.35
    parts:
      - type: fade
        function: ease_in_out_sine

